services:
  m4link:
    build: .
    container_name: m4link
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./config.ini:/app/config.ini:ro
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /app/html